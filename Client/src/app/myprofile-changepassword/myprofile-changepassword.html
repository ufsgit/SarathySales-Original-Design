<header>
    <app-user-nav></app-user-nav>
</header>
<main class="main-container">

    <!-- Breadcrumb Strip -->
    <div class="breadcrumb-strip">
        <span class="home-icon"><i class="fas fa-home"></i></span>
        <a routerLink="/user-home" class="breadcrumb-link">Home</a>
        <span class="breadcrumb-separator">></span>
        <span class="breadcrumb-current">Change Password</span>
    </div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="card">
            <!-- Orange Header -->
            <div class="card-header">
                <div class="header-icon">
                    <i class="fas fa-bars"></i>
                </div>
                <h2>Change Password</h2>
            </div>

            <!-- Form Body -->
            <div class="card-body">
                <form (ngSubmit)="onSubmit()" #passwordForm="ngForm">
                    <div class="form-group">
                        <label for="oldPassword">Old Password :</label>
                        <input type="password" id="oldPassword" name="oldPassword" [(ngModel)]="oldPassword"
                            placeholder="Old Password" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">New Password :</label>
                        <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword"
                            placeholder="New Password" required>
                    </div>

                    <div class="form-group">
                        <label for="verifyNewPassword">Verify New Password :</label>
                        <input type="password" id="verifyNewPassword" name="verifyNewPassword"
                            [(ngModel)]="verifyNewPassword" placeholder="Verify New Password" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-submit">Submit</button>
                        <button type="button" class="btn btn-reset" (click)="onReset()">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>
<app-user-footer></app-user-footer>
