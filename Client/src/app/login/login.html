<div class="login-wrapper">
  <!-- Header -->
  <header class="login-header">
    <div class="logo-left">
      <div class="header-brand" style="display: flex; align-items: center; gap: 15px;">
        <img src="sarathy-logo.png" alt="Sarathy Logo" style="height: 55px; width: auto;">
      </div>
    </div>
    <div class="logo-right">
      <img [src]="getLogo()" [alt]="getBrandName()" style="height: 52px; width: auto; max-width: 180px;">
    </div>
  </header>

  <!-- Orange/Blue Dynamic Theme Strip -->
  <div class="theme-strip">
    <div class="strip-orange" [style.background]="getBrandColor()">
      <span style="color: white !important;">{{ getBrandName() }}</span>
    </div>
    <div class="strip-blue" [style.background]="getBrandGradient()"></div>
  </div>

  <!-- Main Content -->
  <main class="login-body">
    <div class="content-container">

      <!-- Login Card -->
      <div class="login-card">
        <div class="avatar-header">
          <div class="avatar-circle" [style.box-shadow]="'0 0 0 4px ' + getBrandColor()">
            <img src="avatar-woman.png" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
        </div>

        <form (submit)="onLogin()">
          <div class="form-row-custom">
            <label [style.color]="getBrandColor()">Login Id</label>
            <input type="text" name="email" [(ngModel)]="email" placeholder="Enter Username">
          </div>

          <div class="form-row-custom">
            <label [style.color]="getBrandColor()">Password</label>
            <input type="password" name="password" [(ngModel)]="password" placeholder="Enter Password">
          </div>

          <!-- Error Message -->
          @if (errorMessage()) {
          <div style="color:#c0392b; font-size:13px; margin-bottom:8px; text-align:center;">
            {{ errorMessage() }}
          </div>
          }

          <button type="submit" class="btn-login-red" [disabled]="isLoading()" [style.background]="getBrandColor()">
            {{ isLoading() ? 'Logging in...' : 'LOGIN' }}
          </button>
        </form>
      </div>

      <div class="branding-area">
        <div class="big-logo-container">
          <img src="sarathy-logo.png" alt="Sarathy Large Logo" style="width: 480px; height: auto;">
        </div>
      </div>

    </div>
  </main>
  
  <footer class="login-footer">
    <div class="footer-links">
      <a href="#" [style.color]="getBrandColor()">Terms & Conditions</a>
      <a href="#" [style.color]="getBrandColor()">Terms Of Use</a>
      <a href="#" [style.color]="getBrandColor()">FAQ on Sarathy motors</a>
      <a href="#" [style.color]="getBrandColor()">Privacy Policy</a>
      <a href="#" [style.color]="getBrandColor()">Customer Grievance Redresal Policy</a>
      <a href="#" [style.color]="getBrandColor()">Operation Manual</a>
    </div>
    <div class="copyright" [style.color]="getBrandColor()">
      2026 © Sarathy Motors
    </div>
  </footer>
</div>
